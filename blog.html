<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | tbd</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Heebo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" href="favicon.ico" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Debugging on mobile
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script> -->
  </head>
  <body>
    <div id="reading-progress-bar" aria-hidden="true"></div>
    <header></header>
    <div class="container">
      <aside class="sidebar">
        <button
          class="sidebar-collapsible-toggle"
          type="button"
        ></button>
        <div id="sidebar-filter" class="sidebar-section">
            <h3>Controls</h3>
          <button id="toggle-compact">Toggle Compact View</button>
          <h3>Categories</h3>
          <ul id="category-list">
            <li><button data-category="all">All</button></li>
          </ul>
        </div>
      </aside>
      <main class="main-content">
        <div class="blog-header-row">
          <h1>Blog</h1>
          <div class="search-wrapper">
            <input
              type="text"
              class="search-bar"
              id="blog-search"
              placeholder="Search posts..."
              autocomplete="off"
            />
            <button class="search-clear" id="search-clear" aria-label="Clear search" hidden>×</button>
          </div>
        </div>
        <div id="posts-container">
          <!-- Blog posts will be rendered here by JS -->
        </div>
        <div id="c_widget" class="hidden"></div>
        <script src="js/comment-widget.js"></script>
      </main>
    </div>
    <button id="scroll-top-btn" aria-label="Scroll to top" title="Back to top">↑</button>
    <footer></footer>
    <script src="js/main.js"></script>
    <script src="js/include-components.js"></script>
    <script src="js/reactions.js"></script>
    <script src="js/view-counter.js"></script>
    <script src="js/blog.js"></script>
  </body>
</html>
