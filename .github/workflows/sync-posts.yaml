name: Sync Obsidian Posts

on:
  schedule:
    - cron: " 0 0 * * *" # Runs daily at midnight
  repository_dispatch:
    types: [sync-posts]
  workflow_dispatch:

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          path: blog

      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: TomerBenda/tbdocs
          token: ${{ secrets.VAULT_REPO_TOKEN }}
          path: vault

      - name: Sync markdown files from vault
        run: |
          rsync -av --delete --out-format="%i %n" "vault/100 Blog/" blog/posts/ | tee /tmp/rsync_out.txt
          added=$(grep -c '^>f' /tmp/rsync_out.txt || true)
          deleted=$(grep -c '^*deleting' /tmp/rsync_out.txt || true)
          echo "## Sync summary" >> $GITHUB_STEP_SUMMARY
          echo "- Posts added/updated: $added" >> $GITHUB_STEP_SUMMARY
          echo "- Posts deleted: $deleted" >> $GITHUB_STEP_SUMMARY

      - name: Install pyyaml
        run: |
          python3 -m pip install pyyaml

      - name: Generate posts/index.json
        run: |
          cd blog
          python3 scripts/generate_posts_index.py

      - name: Geocode new travel posts
        run: |
          cd blog
          python3 scripts/geocode_travel_posts.py

      - name: Commit and push if changes
        run: |
          cd blog
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --cached --name-only --diff-filter=A | grep '\.md$' > /tmp/new_posts.txt || true
          git diff --cached --quiet || git commit -m "Sync posts from vault and update index.json"
          git pull && git push

      - name: Notify subscribers of new posts
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          [ -s /tmp/new_posts.txt ] || { echo "No new posts, skipping notification."; exit 0; }
          [ -n "$ONESIGNAL_API_KEY" ] || { echo "ONESIGNAL_API_KEY secret not set, skipping."; exit 0; }
          ONESIGNAL_APP_ID=$(grep 'ONESIGNAL_APP_ID = ' blog/js/notifications.js | grep -o '"[^"]*"' | tr -d '"')
          cd blog
          first=$(head -1 /tmp/new_posts.txt)
          count=$(wc -l < /tmp/new_posts.txt | tr -d '[:space:]')
          cat > /tmp/get_title.py << 'PYEOF'
          import yaml, sys
          with open(sys.argv[1]) as f:
              c = f.read()
          if c.startswith('---'):
              e = c.find('---', 3)
              if e > 3:
                  fm = yaml.safe_load(c[3:e]) or {}
                  t = str(fm.get('title', ''))
                  if t:
                      print(t)
                      sys.exit(0)
          print(sys.argv[1])
          PYEOF
          title=$(python3 /tmp/get_title.py "$first")
          filename="${first#posts/}"
          encoded=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe='/'))" "$filename")
          if [ "$count" -gt 1 ]; then
            heading="${count} new posts on tbd.codes"
            body="Including: ${title}"
            url="https://tbd.codes/blog"
          else
            heading="New post: ${title}"
            body="Just published on tbd.codes"
            url="https://tbd.codes/blog?post=${encoded}"
          fi
          json=$(python3 -c "
          import json, sys
          print(json.dumps({
            'app_id': sys.argv[1],
            'included_segments': ['All'],
            'headings': {'en': sys.argv[2]},
            'contents': {'en': sys.argv[3]},
            'url': sys.argv[4]
          }))" "$ONESIGNAL_APP_ID" "$heading" "$body" "$url")
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic ${ONESIGNAL_API_KEY}" \
            --data-binary "$json" \
            https://onesignal.com/api/v1/notifications)
          echo "- Push notification sent (HTTP ${http_code}): **${heading}**" >> $GITHUB_STEP_SUMMARY
