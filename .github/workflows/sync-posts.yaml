name: Sync Obsidian Posts

on:
  schedule:
    - cron: " 0 0 * * *" # Runs daily at midnight
  repository_dispatch:
    types: [sync-posts]
  workflow_dispatch:

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          path: blog

      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: TomerBenda/tbdocs
          token: ${{ secrets.VAULT_REPO_TOKEN }}
          path: vault

      - name: Sync markdown files from vault
        run: |
          rsync -av --delete --out-format="%i %n" "vault/100 Blog/" blog/posts/ | tee /tmp/rsync_out.txt
          added=$(grep -c '^>f' /tmp/rsync_out.txt || true)
          deleted=$(grep -c '^*deleting' /tmp/rsync_out.txt || true)
          echo "## Sync summary" >> $GITHUB_STEP_SUMMARY
          echo "- Posts added/updated: $added" >> $GITHUB_STEP_SUMMARY
          echo "- Posts deleted: $deleted" >> $GITHUB_STEP_SUMMARY

      - name: Install pyyaml
        run: |
          python3 -m pip install pyyaml

      - name: Generate posts/index.json
        run: |
          cd blog
          python3 scripts/generate_posts_index.py

      - name: Commit and push if changes
        run: |
          cd blog
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --cached --quiet || git commit -m "Sync posts from vault and update index.json"
          git pull && git push
