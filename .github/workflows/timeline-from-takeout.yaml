name: Update timeline from Google Maps export

on:
  push:
    paths:
      - 'data/takeout/Timeline.json'
  workflow_dispatch:

jobs:
  timeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate posts/timeline.json
        run: python3 scripts/takeout_to_timeline.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/timeline.json
          git diff --cached --quiet || (git commit -m "Update travel timeline from Google Maps export" && git push)
